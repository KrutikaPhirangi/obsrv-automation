promitor-agent-scraper:
  azureAuthentication: 
    mode: 'ServicePrincipal'
    identity: 
      id: ''
      key: ''
      id: ''
      key: ''
  azureMetadata: 
    tenantId: ''   
    subscriptionId: ''
    resourceGroupName: ''
    tenantId: ''   
    subscriptionId: ''
    resourceGroupName: ''
  metrics:
  - name: azure_application_gateway_response_status
    description: "Http response status returned by Application Gateway"
    resourceType: ApplicationGateway
    azureMetricConfiguration:
      metricName: ResponseStatus
      aggregation:
        type: Total
      dimensions:
      - name: HttpStatusGroup
    resources:
    - applicationGatewayName: ingress-appgateway
  - name: azure_application_gateway_throughput
    description: "Number of bytes per second the Application Gateway has served"
    resourceType: ApplicationGateway
    azureMetricConfiguration:
      metricName: Throughput
      aggregation:
        type: Average
    resources:
    - applicationGatewayName: ingress-appgateway
  - name: azure_application_gateway_total_requests
    description: "Count of successful requests that Application Gateway has served"
    resourceType: ApplicationGateway
    azureMetricConfiguration:
      metricName: TotalRequests
      aggregation:
        type: Total
      dimensions:
      - name: BackendSettingsPool
    resources:
    - applicationGatewayName: ingress-appgateway
  - name: azure_application_gateway_milli_total_time_avg
    description: "Average milliseconds of total time on an Azure application gateway"
    resourceType: ApplicationGateway
    azureMetricConfiguration:
      metricName: ApplicationGatewayTotalTime
      aggregation:
        type: Average
      dimensions:
      - name: Listener
    resources:
    - applicationGatewayName: ingress-appgateway
  - name: azure_application_gateway_milli_total_time_max
    description: "Maximum milliseconds of total time on an Azure application gateway"
    resourceType: ApplicationGateway
    azureMetricConfiguration:
      metricName: ApplicationGatewayTotalTime
      aggregation:
        type: Maximum
      dimensions:
      - name: Listener
    resources:
    - applicationGatewayName: ingress-appgateway
  - name: azure_application_gateway_waf_total_requests
    description: "Total number of requests evaluated by WAF"
    resourceType: ApplicationGateway
    azureMetricConfiguration:
      metricName: AzwafTotalRequests
      aggregation:
        type: Total
      dimensions:
      - name: Action
      - name: CountryCode
      - name: Method
      - name: Mode
      - name: PolicyName
      - name: PolicyScope
    resources:
    - applicationGatewayName: ingress-appgateway
  - name: azure_application_gateway_unhealthy_hosts
