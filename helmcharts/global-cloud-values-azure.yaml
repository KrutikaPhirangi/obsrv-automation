global:
  cloud_storage_provider: &cloud_storage_provider "azure"
  cloud_store_provider: &cloud_store_provider "azure"
  cloud_storage_region: &cloud_storage_region ""
  redis_backup_cloud_bucket: &redis_backup_cloud_bucket ""
  redis_backup_cloud_bucket: &redis_backup_cloud_bucket ""
  dataset_api_container: &dataset_api_container "dataset-api"   
  storageClass: &storage_class "managed-premium"
  azure_storage_account_name: &azure_storage_account_name ""
  azure_storage_account_key: &azure_storage_account_key ""
  azure_storage_container: &azure_storage_container ""
  deep_store_type: &deep_store_type "azure"
  cloud_storage_config: |+
    '{"identity":"name","credential":"key"}'

velero_bucket: &velero_bucket ""
service-account-disable: &service-account-disable
  serviceAccount:
    enabled: false
    create: false 

  deep_store_type: &deep_store_type "azure"
  cloud_storage_config: |+
    '{"identity":"name","credential":"key"}'

velero_bucket: &velero_bucket ""
service-account-disable: &service-account-disable
  serviceAccount:
    enabled: false
    create: false 

redis_backup_sidecar: &redis_backup_sidecar
  master: 
    sidecars:
      - name: redis-backup
        image: sanketikahub/redis-backup:develop-1.0.6-GA
        volumeMounts:
          - mountPath: "/data"
            name: redis-data
        resources:
          requests:
            cpu: 0.1
            memory: 256Mi
          limits:
            cpu: 0.5
            memory: 512Mi
        env:
          - name: REDIS_BACKUP_CRON_SCHEDULE
            value: "00 00 * * *"
          - name: CLOUD_SERVICE
            value: *cloud_store_provider
          - name: AZURE_BACKUP_BUCKET
            value: *azure_storage_container
          - name: AZURE_STORAGE_ACCOUNT_NAME
            value: *azure_storage_account_name
          - name: AZURE_ACCOUNT_KEY
          - name: AZURE_ACCOUNT_KEY
            value: *azure_storage_account_key
          - name: REDIS_RDB_FILE_PATH
            value: "/data"
          - name: REDIS_REPLICATION_MODE
            value: master
          - name: BACKUP_PREFIX
            value: dedup-redis

redis-denorm-backup-sidecar: &redis_denorm_backup_sidecar
  master:
    sidecars:
      - name: redis-backup
        image: sanketikahub/redis-backup:develop-1.0.6-GA
        volumeMounts:
          - mountPath: "/data"
            name: redis-data
        resources:
          requests:
            cpu: 0.1
            memory: 256Mi
          limits:
            cpu: 0.2
            memory: 100Mi
 
