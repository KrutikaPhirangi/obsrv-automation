velero-backup: &velero-backup
  <<: *service-account-disable
  credentials:
    useSecret: true
    secretContents:
      cloud: |
        AZURE_CLIENT_ID=
        AZURE_CLIENT_SECRET=
        AZURE_CLOUD_NAME=AzurePublicCloud
        AZURE_RESOURCE_GROUP=
        AZURE_SUBSCRIPTION_ID=
        AZURE_TENANT_ID=
  configuration:
    provider: *cloud_store_provider
    backupStorageLocation:
      name: default
      provider: *cloud_store_provider
      bucket: *velero_bucket
      prefix: velero
      config:
        storageAccount: ""
        resourceGroup: 
        subscriptionId: ""
    volumeSnapshotLocation:
      name: default
      namespace: velero
      config:
        resourceGroup: 
        subscriptionId: ""
        apiTimeout: 30s
  initContainers:
    - name: velero-plugin-for-azure
      image: velero/velero-plugin-for-microsoft-azure:v1.2.0
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - mountPath: /target
          name: plugins
          
