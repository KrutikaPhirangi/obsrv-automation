extraSecrets:
  client_secret.json: |
    {  "web": {    "issuer": "{{ .Values.keycloak_url }}/realms/sahamati",    "auth_uri": "{{ .Values.keycloak_url }}/realms/sahamati/protocol/openid-connect/auth",    "client_id": "superset-user",    "client_secret": "{{ .Values.sso_admin_client_secret }}",    "redirect_uris": [      "{{ .Values.domain_base_url }}/*"    ],    "userinfo_uri": "{{ .Values.keycloak_url }}/realms/sahamati/protocol/openid-connect/userinfo",    "token_uri": "{{ .Values.keycloak_url }}/realms/sahamati/protocol/openid-connect/token",    "token_introspection_uri": "{{ .Values.keycloak_url }}/realms/sahamati/protocol/openid-connect/token/introspect"  }}
  keycloak_security_manager.py: |
    from flask_appbuilder.security.manager import AUTH_OID
    from superset.security import SupersetSecurityManager
    from flask_oidc import OpenIDConnect
    from flask_appbuilder.security.views import AuthOIDView
    from flask_login import login_user
    from urllib.parse import quote
    from flask_appbuilder.views import expose
    from flask import request, redirect
    import logging
    import os
    from flask import session , current_app
    
    class OIDCSecurityManager(SupersetSecurityManager):
    
        def __init__(self, appbuilder):
            super(OIDCSecurityManager, self).__init__(appbuilder)
            if self.auth_type == AUTH_OID:
                self.oid = OpenIDConnect(self.appbuilder.get_app)
            self.authoidview = AuthOIDCView

        def oauth_user_info(self, provider, response=None):
            # JWT claims from Keycloak
            user_info = self.appbuilder.sm.oauth_user_info_provider(provider, response)
            
            # Map JWT claims to Superset user properties
            return {
                'username': user_info.get('preferred_username'),  # Map Keycloak username to Superset
                'email': user_info.get('email'),  # Map Keycloak email to Superset
                'first_name': user_info.get('given_name'),  # Map first name
                'last_name': user_info.get('family_name'),  # Map last name
                'roles': user_info.get('roles', []),  # Map Keycloak roles to Superset roles (optional)
                'entity_meta': list(user_info.get('entity_meta', {}).keys())
            }
    
    
    class AuthOIDCView(AuthOIDView):
    
        @expose('/login/', methods=['GET', 'POST'])
        def login(self, flag=True):
            sm = self.appbuilder.sm
            oidc = sm.oid
            superset_roles = ["Admin", "Alpha", "Gamma", "Public", "granter", "sql_lab"]
    
            @self.appbuilder.sm.oid.require_login
            def handle_login():
                info = oidc.user_getinfo(['preferred_username', 'given_name', 'family_name', 'email', 'roles', 'secret-expiry-ts', 'entity_meta', 'EntityMetadata'])
                email = oidc.user_getfield('email')
                user = sm.auth_user_oid(email)
                print(f"information service: {info}")
                if user is None: 
                    realm_roles = info.get('roles', {})  
                    print(f"Realm roles: {realm_roles}")        
                    roles = [role for role in superset_roles if role in info.get('roles', [])]
                    roles.extend([role for role in realm_roles if role in superset_roles])
                    role_mapping = {"default-roles-sahamati": "Gamma", "admin" : "Admin"}
                    for role in realm_roles:
                        if role in role_mapping:
                            roles.append(role_mapping[role]); 
                    logging.info(roles); 
                    user = sm.add_user(info.get('email'), info.get('given_name', ''), info.get('family_name', ''),
                                       info.get('email'), [sm.find_role(role) for role in roles])
                entity_meta = info.get('entity_meta', {})
                print(f"entity_meta: {entity_meta}")
                # entity_keys = list(entity_meta.keys())
                entity_keys = 'AA-SIMULATOR'
                print(f"Extracted entity keys: {entity_keys}")     
                if user:
                    login_user(user, remember=False, force=True)
                    return redirect("/dashboard/list/")
                else:
                    flash('Unable to login or create user', 'error')
                    return redirect(self.appbuilder.get_url_for_login)   
            return handle_login()
        

        @expose('/logout/', methods=['GET', 'POST'])
        def logout(self):
            oidc = self.appbuilder.sm.oid
    
            oidc.logout()
            super(AuthOIDCView, self).logout()
            redirect_url = request.url_root.strip('/')
            # redirect_url = request.url_root.strip('/') + self.appbuilder.get_url_for_login
    
            return redirect(
                oidc.client_secrets.get('issuer') + '/protocol/openid-connect/logout?redirect_uri=' + quote(redirect_url))    
      

