  #!/bin/bash
  #rm -rf /var/lib/apt/lists/* && \
  pip install \
    psycopg2-binary==2.9.1 \
    itsdangerous==2.0.1 \
    elasticsearch-dbapi==0.2.9 \
    flask-oidc==1.4.0 \
    Flask-OpenID==1.3.0 \
    PyJWT==2.8.0 \
