    operator: gt
    threshold: [80]
    category: CR
    frequency: 2m
    interval: 1m
    labels: {}
    description: Memory usage is critical on Central Registry Service.
    annotations: {}
    severity: critical

  - name: "Warning Alert: Excessive Memory Utilization Detected in Central Registry service"
    query: max without(label_system_cr, pod) (( max by (pod) (avg_over_time(container_memory_usage_bytes[$__range]) / on (pod) group_left max by (pod) (kube_pod_container_resource_limits{resource="memory"})) * 100)* on (pod) group_left (label_system_proxy)kube_pod_labels{label_system_proxy="true"})
    operator: within_range
    threshold: [60,80]
    category: CR
    frequency: 2m
