    labels: {}
    description: Memory usage is high on Central Registry Service.
    annotations: {}
    severity: warning

  - name: Reporting System Recovery Update
    query:  (sum without(pod) (sum by (pod) (ceil(increase(kube_pod_container_status_restarts_total[$__range]))) * on(pod) kube_pod_labels{label_system_cr='true'}))
